<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>でんしカルテ - おいしゃさんごっこ</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #fff9c4 100%);
    min-height: 100vh;
    font-size: 18px;
    color: #5d4037;
    padding: 8px;
  }

  /* ===== カルテ全体 ===== */
  .karte {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  /* ===== ヘッダー ===== */
  .header {
    background: linear-gradient(135deg, #f8bbd0, #b3e5fc);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h1 {
    font-size: 26px;
    color: #e91e63;
    white-space: nowrap;
  }

  .key-hint {
    font-size: 13px;
    color: #ad1457;
    opacity: 0.7;
  }

  .lamps {
    display: flex;
    gap: 8px;
  }

  .lamp {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e0e0e0;
    border: 2px solid #bdbdbd;
    transition: all 0.15s ease;
  }

  .lamp.on {
    border-color: transparent;
    box-shadow: 0 0 12px 4px var(--glow-color);
    animation: lampPulse 0.4s ease;
  }

  @keyframes lampPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ===== メインレイアウト（横2カラム） ===== */
  .main-layout {
    display: flex;
    flex-direction: column;
  }

  /* ===== 左側：入力エリア ===== */
  .left-panel {
    flex: 1;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section {
    padding: 10px 14px;
    background: #fafafa;
    border-radius: 14px;
    border: 1px solid #f0f0f0;
  }

  .section-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #e91e63;
  }

  /* 患者情報入力 */
  .patient-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 8px 12px;
    align-items: center;
  }

  .patient-grid label {
    font-weight: bold;
    font-size: 16px;
    white-space: nowrap;
  }

  .patient-grid input[type="text"],
  .patient-grid input[type="number"] {
    padding: 6px 10px;
    border: 2px solid #f8bbd0;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }

  .patient-grid input:focus {
    border-color: #e91e63;
    box-shadow: 0 0 0 3px rgba(233,30,99,0.15);
  }

  .gender-options {
    display: flex;
    gap: 12px;
  }

  .gender-options label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-weight: normal;
    font-size: 16px;
  }

  .gender-options input[type="radio"] {
    width: 18px;
    height: 18px;
    accent-color: #e91e63;
  }

  .birthday-input-wrap input[type="date"] {
    padding: 6px 10px;
    border: 2px solid #f8bbd0;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    width: 100%;
    color: #5d4037;
    background: #fff;
  }

  .birthday-input-wrap input[type="date"]:focus {
    border-color: #e91e63;
    box-shadow: 0 0 0 3px rgba(233,30,99,0.15);
  }

  /* 部位行 */
  .part-rows {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .part-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 8px;
    background: #fafafa;
    border-radius: 10px;
  }

  .toggle-btn {
    padding: 6px 16px;
    border: 2px solid #ce93d8;
    border-radius: 30px;
    background: #fff;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #7b1fa2;
    user-select: none;
    min-width: 90px;
    text-align: center;
  }

  .toggle-btn:hover {
    background: #f3e5f5;
  }

  .toggle-btn.active {
    background: #ce93d8;
    color: #fff;
    border-color: #ab47bc;
    animation: btnBounce 0.3s ease;
  }

  @keyframes btnBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* 重症度ドット */
  .severity {
    display: flex;
    gap: 4px;
  }

  .severity-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #ddd;
    background: #f0f0f0;
    transition: all 0.15s ease;
    user-select: none;
    cursor: default;
  }

  .severity.disabled .severity-dot {
    opacity: 0.35;
  }

  .severity.enabled .severity-dot {
    cursor: pointer;
    opacity: 1;
  }

  .severity.enabled .severity-dot:hover {
    transform: scale(1.15);
  }

  .severity.enabled .severity-dot.filled[data-val="1"] {
    background: #a5d6a7; border-color: #66bb6a;
  }
  .severity.enabled .severity-dot.filled[data-val="2"] {
    background: #fff176; border-color: #fdd835;
  }
  .severity.enabled .severity-dot.filled[data-val="3"] {
    background: #ffb74d; border-color: #ffa726;
  }
  .severity.enabled .severity-dot.filled[data-val="4"] {
    background: #ef5350; border-color: #e53935;
  }
  .severity.enabled .severity-dot.filled[data-val="5"] {
    background: #c62828; border-color: #b71c1c;
  }

  /* 症状ボタン */
  .symptoms {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .symptom-btn {
    padding: 6px 16px;
    border: 2px solid #81d4fa;
    border-radius: 30px;
    background: #fff;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #0277bd;
    user-select: none;
  }

  .symptom-btn:hover {
    background: #e1f5fe;
  }

  .symptom-btn.active {
    background: #4fc3f7;
    color: #fff;
    border-color: #0288d1;
    animation: btnBounce 0.3s ease;
  }

  /* 体温 */
  .temp-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }

  .temp-preset-btn {
    padding: 5px 12px;
    border: 2px solid #ef9a9a;
    border-radius: 20px;
    background: #fff;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #c62828;
    user-select: none;
  }

  .temp-preset-btn:hover {
    background: #ffebee;
  }

  .temp-preset-btn.active {
    background: #ef9a9a;
    color: #fff;
    border-color: #e53935;
  }

  .temperature-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .temperature-row input {
    width: 100px;
    padding: 6px 10px;
    border: 2px solid #f8bbd0;
    border-radius: 10px;
    font-size: 20px;
    font-family: inherit;
    text-align: center;
    outline: none;
    font-weight: bold;
  }

  .temperature-row input:focus {
    border-color: #e91e63;
    box-shadow: 0 0 0 3px rgba(233,30,99,0.15);
  }

  .temp-unit {
    font-size: 18px;
    font-weight: bold;
    color: #e91e63;
  }

  .temp-status {
    font-size: 15px;
    font-weight: bold;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .temp-status.normal {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .temp-status.slight {
    background: #fff8e1;
    color: #f57f17;
  }

  .temp-status.fever {
    background: #ffebee;
    color: #c62828;
  }

  /* けんさボタン */
  .test-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .test-toggle-btn {
    padding: 8px 20px;
    border: 2px solid #80cbc4;
    border-radius: 30px;
    background: #fff;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #00695c;
    user-select: none;
  }

  .test-toggle-btn:hover {
    background: #e0f2f1;
  }

  .test-toggle-btn.active {
    background: #80cbc4;
    color: #fff;
    border-color: #00897b;
    animation: btnBounce 0.3s ease;
  }

  /* けんさ結果ボックス */
  .result-test {
    background: #e8f5e9;
    border: 2px solid #a5d6a7;
  }
  .result-test h3 { color: #2e7d32; }
  .result-test .result-text.empty { color: #ddd; }

  /* しんだんボタン */
  .diagnose-btn {
    width: 100%;
    padding: 14px;
    font-size: 22px;
    font-family: inherit;
    font-weight: bold;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: linear-gradient(135deg, #f48fb1, #ce93d8);
    color: #fff;
    transition: all 0.2s ease;
    letter-spacing: 2px;
  }

  .diagnose-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(233,30,99,0.3);
  }

  .diagnose-btn:active {
    transform: translateY(0);
  }

  /* ===== 右側：結果エリア ===== */
  .right-panel {
    width: 38%;
    background: #fdf6ff;
    border-left: 3px dashed #f0e0f0;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .right-panel .section-title {
    font-size: 18px;
    font-weight: bold;
    color: #e91e63;
    margin-bottom: 4px;
  }

  /* 患者サマリー */
  .patient-summary {
    background: #fff;
    border: 2px solid #f8bbd0;
    border-radius: 14px;
    padding: 12px 14px;
  }

  .patient-summary-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 16px;
  }

  .patient-summary-grid dt {
    font-weight: bold;
    color: #ad1457;
  }

  .patient-summary-grid dd {
    color: #888;
  }

  .patient-summary-grid dd.filled {
    color: #5d4037;
    font-weight: bold;
  }

  .reception-number {
    font-size: 22px;
    font-weight: bold;
    color: #e91e63;
    background: #fce4ec;
    padding: 4px 12px;
    border-radius: 10px;
    letter-spacing: 4px;
    display: inline-block;
  }

  /* 結果ボックス */
  .result-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-box {
    border-radius: 14px;
    padding: 12px;
    transition: all 0.3s ease;
  }

  .result-box h3 {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .result-box .result-text {
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
    background: #fff;
    border-radius: 10px;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-shindan {
    background: #fff8e1;
    border: 2px solid #ffe082;
  }
  .result-shindan h3 { color: #e91e63; }
  .result-shindan .result-text.empty { color: #ddd; }

  .result-medicine {
    background: #f3e5f5;
    border: 2px solid #ce93d8;
  }
  .result-medicine h3 { color: #7b1fa2; }
  .result-medicine .result-text.empty { color: #ddd; }

  .result-advice {
    background: #e1f5fe;
    border: 2px solid #81d4fa;
  }
  .result-advice h3 { color: #0288d1; }
  .result-advice .result-text.empty { color: #ddd; }

  .result-text.filled {
    animation: resultAppear 0.5s ease;
  }

  @keyframes resultAppear {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  /* リセットボタン */
  .reset-btn {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    border: 2px solid #b3e5fc;
    border-radius: 14px;
    cursor: pointer;
    background: #e1f5fe;
    color: #0288d1;
    transition: all 0.2s ease;
    letter-spacing: 2px;
    margin-top: auto;
  }

  .reset-btn:hover {
    background: #b3e5fc;
  }

  /* ===========================
     RESPONSIVE LAYOUT
     Mobile-first breakpoints:
     - Base (default): < 640px  → single column, scrollable
     - Tablet:  640px – 1024px  → 2 columns, better proportions
     - Desktop: > 1024px        → original 2-column layout
  =========================== */

  /* --- TABLET: 640px and up --- */
  @media (min-width: 640px) {
    .main-layout {
      flex-direction: row;
    }

    .left-panel {
      flex: 1;
    }

    .right-panel {
      width: 42%;
      border-left: 3px dashed #f0e0f0;
      border-top: none;
    }
  }

  /* --- DESKTOP: 1024px and up --- */
  @media (min-width: 1024px) {
    .right-panel {
      width: 38%;
    }
  }

  /* --- MOBILE: 639px and below --- */
  @media (max-width: 639px) {
    /* 左右パネルを縦積みに */
    .left-panel {
      width: 100%;
    }

    .right-panel {
      width: 100%;
      border-left: none;
      border-top: 3px dashed #f0e0f0;
      padding: 12px;
    }

    /* ヘッダー：キーボードヒント非表示・コンパクト化 */
    .key-hint {
      display: none;
    }

    .header {
      padding: 8px 12px;
      gap: 8px;
    }

    .header h1 {
      font-size: 20px;
    }

    .lamps {
      gap: 5px;
    }

    .lamp {
      width: 18px;
      height: 18px;
    }

    /* 患者情報グリッド：4列→2列 */
    .patient-grid {
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
    }

    /* 重症度ドット：26px→44px（タッチターゲット確保） */
    .severity {
      gap: 6px;
      flex-wrap: wrap;
    }

    .severity-dot {
      width: 44px;
      height: 44px;
    }

    .severity.enabled .severity-dot:hover {
      transform: none;
    }

    .part-row {
      padding: 4px 8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toggle-btn {
      min-width: 80px;
      font-size: 16px;
    }

    /* 体温プリセットボタン：等幅配置 */
    .temp-preset-btn {
      padding: 8px 10px;
      font-size: 15px;
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .temperature-row {
      flex-wrap: wrap;
      gap: 10px;
    }

    .temperature-row input {
      width: 120px;
      font-size: 22px;
      padding: 8px 10px;
    }

    /* 症状ボタン */
    .symptom-btn {
      padding: 10px 18px;
      font-size: 16px;
    }

    /* 診断ボタン */
    .diagnose-btn {
      padding: 16px;
      font-size: 20px;
    }

    /* カルテ結果エリア */
    .patient-summary-grid {
      font-size: 15px;
      gap: 4px 8px;
    }

    .result-box {
      padding: 10px;
    }

    .result-box .result-text {
      font-size: 18px;
    }

    .reception-number {
      font-size: 18px;
      letter-spacing: 2px;
    }

    .reset-btn {
      padding: 14px;
      font-size: 16px;
    }
  }
</style>
</head>
<body>

<div class="karte">
  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <h1>🏥 でんしカルテ</h1>
      <span class="key-hint">⌨ キーボードを おすと ランプが ひかるよ！</span>
    </div>
    <div class="lamps" id="lamps">
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
    </div>
  </div>

  <!-- メイン2カラム -->
  <div class="main-layout">

    <!-- ===== 左パネル：入力エリア ===== -->
    <div class="left-panel">

      <!-- 患者情報入力 -->
      <div class="section">
        <div class="section-title">📝 かんじゃさん じょうほう</div>
        <div class="patient-grid">
          <label>なまえ</label>
          <input type="text" id="patientName" placeholder="なまえを いれてね">

          <label>せいべつ</label>
          <div class="gender-options">
            <label><input type="radio" name="gender" value="boy"> おとこのこ</label>
            <label><input type="radio" name="gender" value="girl"> おんなのこ</label>
          </div>

          <label>たんじょうび</label>
          <div class="birthday-input-wrap">
            <input type="date" id="birthDate" min="2019-01-01" max="2026-12-31">
          </div>
        </div>
      </div>

      <!-- どこがつらい -->
      <div class="section">
        <div class="section-title">🩺 どこが つらい？</div>
        <div class="part-rows" id="bodyParts">
          <div class="part-row">
            <button class="toggle-btn" data-part="おなか">おなか</button>
            <div class="severity disabled" data-part="おなか">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="あたま">あたま</button>
            <div class="severity disabled" data-part="あたま">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="のど">のど</button>
            <div class="severity disabled" data-part="のど">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="て・あし">て・あし</button>
            <div class="severity disabled" data-part="て・あし">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="みみ">みみ</button>
            <div class="severity disabled" data-part="みみ">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="め">め</button>
            <div class="severity disabled" data-part="め">
              <div class="severity-dot" data-val="1"></div><div class="severity-dot" data-val="2"></div><div class="severity-dot" data-val="3"></div><div class="severity-dot" data-val="4"></div><div class="severity-dot" data-val="5"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- たいおん -->
      <div class="section">
        <div class="section-title">🌡 たいおん</div>
        <div class="temp-presets" id="tempPresets">
          <button class="temp-preset-btn" data-temp="36.0">36.0℃</button>
          <button class="temp-preset-btn" data-temp="36.5">36.5℃</button>
          <button class="temp-preset-btn" data-temp="37.0">37.0℃</button>
          <button class="temp-preset-btn" data-temp="37.5">37.5℃</button>
          <button class="temp-preset-btn" data-temp="38.0">38.0℃</button>
          <button class="temp-preset-btn" data-temp="38.5">38.5℃</button>
          <button class="temp-preset-btn" data-temp="39.0">39.0℃</button>
        </div>
        <div class="temperature-row">
          <input type="number" id="temperature" min="35.0" max="42.0" step="0.1" placeholder="36.5">
          <span class="temp-unit">℃</span>
          <span class="temp-status" id="tempStatus"></span>
        </div>
      </div>

      <!-- けんさ（37.5以上のときに表示） -->
      <div class="section" id="testSection" style="display:none;">
        <div class="section-title">🧪 けんさ する？</div>
        <div class="test-options">
          <button class="test-toggle-btn" data-test="covid">コロナ けんさ</button>
          <button class="test-toggle-btn" data-test="influ">インフル けんさ</button>
        </div>
      </div>

      <!-- どんなかんじ -->
      <div class="section">
        <div class="section-title">🤔 どんな かんじ？</div>
        <div class="symptoms" id="symptoms">
          <button class="symptom-btn" data-symptom="いたい">いたい</button>
          <button class="symptom-btn" data-symptom="かゆい">かゆい</button>
          <button class="symptom-btn" data-symptom="ねつがある">ねつがある</button>
          <button class="symptom-btn" data-symptom="だるい">だるい</button>
          <button class="symptom-btn" data-symptom="せきがでる">せきがでる</button>
        </div>
      </div>

      <!-- しんだんボタン -->
      <button class="diagnose-btn" id="diagnoseBtn">🔍 しんだんする！</button>
    </div>

    <!-- ===== 右パネル：結果表示 ===== -->
    <div class="right-panel">
      <div class="section-title">📋 カルテ</div>

      <div class="patient-summary">
        <dl class="patient-summary-grid">
          <dt>うけつけ No.</dt>
          <dd><span class="reception-number" id="receptionNumber">0001</span></dd>
          <dt>なまえ</dt>
          <dd id="summaryName">ー</dd>
          <dt>せいべつ</dt>
          <dd id="summaryGender">ー</dd>
          <dt>たんじょうび</dt>
          <dd id="summaryBirthday">ー</dd>
          <dt>たいおん</dt>
          <dd id="summaryTemp">ー</dd>
        </dl>
      </div>

      <div class="result-section">
        <div class="result-box result-shindan">
          <h3>🩺 しんだん けっか</h3>
          <div class="result-text empty" id="resultDiagnosis">しんだん まち…</div>
        </div>
        <div class="result-box result-medicine">
          <h3>💊 おくすり</h3>
          <div class="result-text empty" id="resultMedicine">しんだん まち…</div>
        </div>
        <div class="result-box result-advice">
          <h3>📝 せんせいから ひとこと</h3>
          <div class="result-text empty" id="resultAdvice">しんだん まち…</div>
        </div>
        <div class="result-box result-test" id="testResultBox" style="display:none;">
          <h3>🧪 けんさ けっか</h3>
          <div class="result-text empty" id="resultTest">けんさ まち…</div>
        </div>
      </div>

      <button class="reset-btn" id="resetBtn">👋 つぎの かんじゃさん</button>
    </div>

  </div>
</div>

<script>
  // --- 状態管理 ---
  const state = {
    selectedParts: {},
    selectedSymptoms: new Set(),
    selectedTests: new Set()
  };

  // --- 受付番号 ---
  function generateReceptionNumber() {
    return String(Math.floor(Math.random() * 9999) + 1).padStart(4, '0');
  }
  document.getElementById('receptionNumber').textContent = generateReceptionNumber();

  // --- サマリー更新 ---
  document.getElementById('patientName').addEventListener('input', updateSummary);
  document.querySelectorAll('input[name="gender"]').forEach(r => r.addEventListener('change', updateSummary));
  document.getElementById('birthDate').addEventListener('change', updateSummary);
  document.getElementById('temperature').addEventListener('input', () => {
    document.querySelectorAll('.temp-preset-btn').forEach(b => b.classList.remove('active'));
    updateTempStatus();
    updateSummary();
  });

  document.getElementById('tempPresets').addEventListener('click', (e) => {
    const btn = e.target.closest('.temp-preset-btn');
    if (!btn) return;
    document.querySelectorAll('.temp-preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('temperature').value = btn.dataset.temp;
    updateTempStatus();
    updateSummary();
  });

  function updateTempStatus() {
    const val = parseFloat(document.getElementById('temperature').value);
    const el = document.getElementById('tempStatus');
    const testSection = document.getElementById('testSection');
    if (isNaN(val)) {
      el.textContent = ''; el.className = 'temp-status';
      testSection.style.display = 'none';
      state.selectedTests.clear();
      document.querySelectorAll('.test-toggle-btn').forEach(b => b.classList.remove('active'));
      return;
    }
    if (val < 37.0) { el.textContent = 'へいねつ'; el.className = 'temp-status normal'; }
    else if (val < 37.5) { el.textContent = 'びねつ'; el.className = 'temp-status slight'; }
    else { el.textContent = 'おねつ！'; el.className = 'temp-status fever'; }
    testSection.style.display = val >= 37.5 ? '' : 'none';
    if (val < 37.5) {
      state.selectedTests.clear();
      document.querySelectorAll('.test-toggle-btn').forEach(b => b.classList.remove('active'));
    }
  }

  function updateSummary() {
    const name = document.getElementById('patientName').value;
    const genderEl = document.querySelector('input[name="gender"]:checked');
    const dateVal = document.getElementById('birthDate').value;

    const nameDD = document.getElementById('summaryName');
    nameDD.textContent = name || 'ー';
    nameDD.className = name ? 'filled' : '';

    const genderDD = document.getElementById('summaryGender');
    if (genderEl) { genderDD.textContent = genderEl.value === 'boy' ? 'おとこのこ' : 'おんなのこ'; genderDD.className = 'filled'; }
    else { genderDD.textContent = 'ー'; genderDD.className = ''; }

    const bdDD = document.getElementById('summaryBirthday');
    if (dateVal) { const [y, m, d] = dateVal.split('-'); bdDD.textContent = Number(y) + 'ねん ' + Number(m) + 'がつ ' + Number(d) + 'にち'; bdDD.className = 'filled'; }
    else { bdDD.textContent = 'ー'; bdDD.className = ''; }

    const tempVal = document.getElementById('temperature').value;
    const tempDD = document.getElementById('summaryTemp');
    if (tempVal) { tempDD.textContent = tempVal + ' ℃'; tempDD.className = 'filled'; }
    else { tempDD.textContent = 'ー'; tempDD.className = ''; }
  }

  // --- ランプ ---
  const lampColors = ['#f48fb1','#81d4fa','#fff176','#a5d6a7','#ce93d8','#ffab91','#80deea','#f8bbd0'];
  const lamps = document.querySelectorAll('.lamp');
  // タッチでランプ点灯（モバイル向け）
  document.querySelector('.karte').addEventListener('touchstart', () => {
    if (window.innerWidth >= 640) return;
    const count = Math.floor(Math.random() * 2) + 1;
    const indices = [];
    while (indices.length < count) { const idx = Math.floor(Math.random() * lamps.length); if (!indices.includes(idx)) indices.push(idx); }
    indices.forEach(idx => {
      const lamp = lamps[idx];
      const color = lampColors[Math.floor(Math.random() * lampColors.length)];
      lamp.style.background = color;
      lamp.style.setProperty('--glow-color', color);
      lamp.classList.remove('on'); void lamp.offsetWidth; lamp.classList.add('on');
      setTimeout(() => { lamp.classList.remove('on'); lamp.style.background = '#e0e0e0'; }, 400 + Math.random() * 300);
    });
  }, { passive: true });

  document.addEventListener('keydown', () => {
    const count = Math.floor(Math.random() * 3) + 1;
    const indices = [];
    while (indices.length < count) { const idx = Math.floor(Math.random() * lamps.length); if (!indices.includes(idx)) indices.push(idx); }
    indices.forEach(idx => {
      const lamp = lamps[idx];
      const color = lampColors[Math.floor(Math.random() * lampColors.length)];
      lamp.style.background = color;
      lamp.style.setProperty('--glow-color', color);
      lamp.classList.remove('on'); void lamp.offsetWidth; lamp.classList.add('on');
      setTimeout(() => { lamp.classList.remove('on'); lamp.style.background = '#e0e0e0'; }, 400 + Math.random() * 300);
    });
  });

  // --- 部位ボタン ---
  document.getElementById('bodyParts').addEventListener('click', (e) => {
    const btn = e.target.closest('.toggle-btn');
    if (btn) {
      const part = btn.dataset.part;
      const sevDiv = document.querySelector('.severity[data-part="' + part + '"]');
      if (btn.classList.contains('active')) {
        btn.classList.remove('active'); delete state.selectedParts[part];
        sevDiv.classList.remove('enabled'); sevDiv.classList.add('disabled');
        sevDiv.querySelectorAll('.severity-dot').forEach(s => s.classList.remove('filled'));
      } else {
        btn.classList.add('active'); state.selectedParts[part] = 1;
        sevDiv.classList.remove('disabled'); sevDiv.classList.add('enabled');
        updateSeverityUI(part);
      }
      return;
    }
    const dot = e.target.closest('.severity-dot');
    if (dot) {
      const sevDiv = dot.closest('.severity');
      if (sevDiv.classList.contains('disabled')) return;
      state.selectedParts[sevDiv.dataset.part] = Number(dot.dataset.val);
      updateSeverityUI(sevDiv.dataset.part);
    }
  });

  function updateSeverityUI(part) {
    const sevDiv = document.querySelector('.severity[data-part="' + part + '"]');
    const level = state.selectedParts[part] || 0;
    sevDiv.querySelectorAll('.severity-dot').forEach(s => {
      s.classList.toggle('filled', Number(s.dataset.val) <= level);
    });
  }

  // --- 症状ボタン ---
  document.getElementById('symptoms').addEventListener('click', (e) => {
    const btn = e.target.closest('.symptom-btn');
    if (!btn) return;
    const symptom = btn.dataset.symptom;
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) state.selectedSymptoms.add(symptom);
    else state.selectedSymptoms.delete(symptom);
  });

  // --- けんさボタン ---
  document.getElementById('testSection').addEventListener('click', (e) => {
    const btn = e.target.closest('.test-toggle-btn');
    if (!btn) return;
    const test = btn.dataset.test;
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) state.selectedTests.add(test);
    else state.selectedTests.delete(test);
  });

  // --- 診断 ---
  const diagnoses = {
    'おなか': ['おなかの かぜ だね！','すこし おなかが つかれてるね','おなかの むしさんが げんき すぎるね'],
    'あたま': ['すこし あたまが つかれてるね','あたまの かぜ だね！','かんがえ すぎちゃったかな'],
    'のど': ['のどの かぜ だね！','のどが カラカラ だね','のどの ばいきんさんが いるね'],
    'て・あし': ['すこし つかれが たまってるね','いっぱい あそんだ しょうこ だね！','きんにくさんが がんばりすぎ だね'],
    'みみ': ['みみの おそうじが ひつよう だね','みみさんが すこし おつかれ だね','みみの なかに ちいさい ばいきんさんが いるね'],
    'め': ['めが すこし つかれてるね','めの ばいきんさんを やっつけよう！','めを たくさん つかったね']
  };
  const medicines = ['いちごあじの おくすりシロップ','メロンあじの のみぐすり','にじいろ ばんそうこう','おほしさま カプセル','ブルーベリーあじの おくすり','ハートがたの ビタミンざい','きらきら おくすりシール','ぶどうあじの トローチ','さくらいろの ぬりぐすり','バナナあじの おくすりゼリー'];
  const advicesNormal = ['きょうは はやく ねようね','おみずを たくさん のもうね','あったかく して やすんでね','だいじょうぶ！ すぐ げんきに なるよ','ゆっくり やすめば なおるよ','えいようの ある ごはんを たべようね'];
  const advicesSerious = ['しっかり おやすみ してね！ だいじょうぶ！','たくさん ねて たくさん たべてね！','おくすりを のんで ぐっすり ねようね！','あしたには げんきに なるよ！ やくそく！'];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function setResult(id, text) {
    const el = document.getElementById(id);
    el.textContent = text; el.classList.remove('empty'); el.classList.add('filled');
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
  }
  function clearResult(id, ph) {
    const el = document.getElementById(id);
    el.textContent = ph; el.classList.remove('filled'); el.classList.add('empty');
  }

  document.getElementById('diagnoseBtn').addEventListener('click', () => {
    const parts = Object.keys(state.selectedParts);
    const temp = parseFloat(document.getElementById('temperature').value);
    const hasFever = !isNaN(temp) && temp >= 37.5;
    if (parts.length === 0 && state.selectedSymptoms.size === 0 && !hasFever) {
      setResult('resultDiagnosis', 'とっても げんき だね！');
      setResult('resultMedicine', 'おくすりは いらないよ！');
      setResult('resultAdvice', 'この ちょうしで がんばろう！');
    } else {
      let mainPart = parts[0] || 'からだ', maxStrength = 0;
      parts.forEach(p => { if (state.selectedParts[p] > maxStrength) { maxStrength = state.selectedParts[p]; mainPart = p; } });
      setResult('resultDiagnosis', pick(diagnoses[mainPart] || ['ちょっと つかれて いるみたい']));
      setResult('resultMedicine', pick(medicines));
      if (hasFever) setResult('resultAdvice', 'おねつが あるから しっかり やすんでね！');
      else if (maxStrength >= 4) setResult('resultAdvice', pick(advicesSerious));
      else setResult('resultAdvice', pick(advicesNormal));
    }

    // けんさ結果
    const testBox = document.getElementById('testResultBox');
    if (state.selectedTests.size > 0) {
      const lines = [];
      if (state.selectedTests.has('covid')) {
        const pos = Math.random() < 0.3;
        lines.push('コロナ：' + (pos ? '🔴 ようせい' : '🟢 いんせい'));
        if (pos) setResult('resultAdvice', 'コロナが みつかったよ！ おうちで ゆっくり やすんでね！');
      }
      if (state.selectedTests.has('influ')) {
        const pos = Math.random() < 0.3;
        lines.push('インフル：' + (pos ? '🔴 ようせい' : '🟢 いんせい'));
        if (pos) setResult('resultAdvice', 'インフルエンザ だよ！ しっかり おやすみ してね！');
      }
      if (state.selectedTests.has('covid') && state.selectedTests.has('influ')) {
        const covidPos = lines[0].includes('ようせい');
        const influPos = lines[1].includes('ようせい');
        if (covidPos && influPos) setResult('resultAdvice', 'コロナも インフルも みつかったよ！ たくさん ゆっくり やすんでね！');
      }
      setResult('resultTest', lines.join('\n'));
      testBox.style.display = '';
    } else {
      testBox.style.display = 'none';
    }

    // モバイルのみ：結果パネルへ自動スクロール
    if (window.innerWidth < 640) {
      const rightPanel = document.querySelector('.right-panel');
      if (rightPanel) rightPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });

  // --- リセット ---
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('receptionNumber').textContent = generateReceptionNumber();
    document.getElementById('patientName').value = '';
    document.querySelectorAll('input[name="gender"]').forEach(r => r.checked = false);
    document.getElementById('birthDate').value = '';
    document.getElementById('temperature').value = '';
    document.getElementById('tempStatus').textContent = '';
    document.getElementById('tempStatus').className = 'temp-status';
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    state.selectedParts = {};
    document.querySelectorAll('.severity').forEach(s => {
      s.classList.remove('enabled'); s.classList.add('disabled');
      s.querySelectorAll('.severity-dot').forEach(st => st.classList.remove('filled'));
    });
    document.querySelectorAll('.temp-preset-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
    state.selectedSymptoms.clear();
    document.getElementById('testSection').style.display = 'none';
    document.querySelectorAll('.test-toggle-btn').forEach(b => b.classList.remove('active'));
    state.selectedTests.clear();
    document.getElementById('testResultBox').style.display = 'none';
    clearResult('resultDiagnosis', 'しんだん まち…');
    clearResult('resultMedicine', 'しんだん まち…');
    clearResult('resultAdvice', 'しんだん まち…');
    clearResult('resultTest', 'けんさ まち…');
    updateSummary();
  });
</script>

</body>
</html>

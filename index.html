<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>でんしカルテ - おいしゃさんごっこ</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 50%, #fff9c4 100%);
    min-height: 100vh;
    padding: 12px;
    font-size: 16px;
    color: #5d4037;
  }

  /* ===== ヘッダー ===== */
  .header {
    background: linear-gradient(135deg, #f8bbd0, #b3e5fc);
    padding: 10px 20px;
    border-radius: 16px 16px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h1 {
    font-size: 22px;
    color: #e91e63;
    white-space: nowrap;
  }

  .key-hint {
    font-size: 11px;
    color: #ad1457;
    opacity: 0.7;
  }

  .lamps {
    display: flex;
    gap: 8px;
  }

  .lamp {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #e0e0e0;
    border: 2px solid #bdbdbd;
    transition: all 0.15s ease;
  }

  .lamp.on {
    border-color: transparent;
    box-shadow: 0 0 12px 4px var(--glow-color);
    animation: lampPulse 0.4s ease;
  }

  @keyframes lampPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ===== メインレイアウト（横2カラム） ===== */
  .karte {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .main-layout {
    display: flex;
    min-height: calc(100vh - 80px);
  }

  /* ===== 左側：入力エリア ===== */
  .left-panel {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* 患者情報サマリー（左上） */
  .patient-summary {
    background: #fff;
    border: 2px solid #f8bbd0;
    border-radius: 14px;
    padding: 12px 14px;
  }

  .patient-summary-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-size: 14px;
  }

  .patient-summary-grid dt {
    font-weight: bold;
    color: #ad1457;
  }

  .patient-summary-grid dd {
    color: #888;
  }

  .patient-summary-grid dd.filled {
    color: #5d4037;
    font-weight: bold;
  }

  .reception-number {
    font-size: 20px;
    font-weight: bold;
    color: #e91e63;
    background: #fce4ec;
    padding: 4px 12px;
    border-radius: 10px;
    letter-spacing: 4px;
    display: inline-block;
  }

  /* 結果ボックス群 */
  .result-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-box {
    border-radius: 14px;
    padding: 14px;
    transition: all 0.3s ease;
  }

  .result-box h3 {
    font-size: 14px;
    margin-bottom: 6px;
  }

  .result-box .result-text {
    font-size: 18px;
    font-weight: bold;
    padding: 10px;
    background: #fff;
    border-radius: 10px;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-shindan {
    background: #fff8e1;
    border: 2px solid #ffe082;
  }
  .result-shindan h3 { color: #e91e63; }
  .result-shindan .result-text.empty { color: #ddd; }

  .result-medicine {
    background: #f3e5f5;
    border: 2px solid #ce93d8;
  }
  .result-medicine h3 { color: #7b1fa2; }
  .result-medicine .result-text.empty { color: #ddd; }

  .result-advice {
    background: #e1f5fe;
    border: 2px solid #81d4fa;
  }
  .result-advice h3 { color: #0288d1; }
  .result-advice .result-text.empty { color: #ddd; }

  .result-text.filled {
    animation: resultAppear 0.5s ease;
  }

  @keyframes resultAppear {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  /* リセットボタン（左下） */
  .reset-btn {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    font-weight: bold;
    border: 2px solid #b3e5fc;
    border-radius: 14px;
    cursor: pointer;
    background: #e1f5fe;
    color: #0288d1;
    transition: all 0.2s ease;
    letter-spacing: 2px;
    margin-top: auto;
  }

  .reset-btn:hover {
    background: #b3e5fc;
  }

  /* ===== 右側：結果エリア ===== */
  .right-panel {
    width: 38%;
    min-width: 320px;
    background: #fdf6ff;
    border-left: 3px dashed #f0e0f0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .right-panel .section-title {
    font-size: 15px;
    font-weight: bold;
    color: #e91e63;
    margin-bottom: 4px;
  }

  .section {
    padding: 12px 14px;
    background: #fafafa;
    border-radius: 14px;
    border: 1px solid #f0f0f0;
  }

  .section-title {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #e91e63;
  }

  /* 患者情報入力 */
  .patient-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 8px 10px;
    align-items: center;
  }

  .patient-grid label {
    font-weight: bold;
    font-size: 14px;
    white-space: nowrap;
  }

  .patient-grid input[type="text"],
  .patient-grid input[type="number"] {
    padding: 7px 10px;
    border: 2px solid #f8bbd0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }

  .patient-grid input:focus {
    border-color: #e91e63;
    box-shadow: 0 0 0 3px rgba(233,30,99,0.15);
  }

  .gender-options {
    display: flex;
    gap: 10px;
  }

  .gender-options label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-weight: normal;
    font-size: 14px;
  }

  .gender-options input[type="radio"] {
    width: 18px;
    height: 18px;
    accent-color: #e91e63;
  }

  .birthday-input-wrap input[type="date"] {
    padding: 7px 10px;
    border: 2px solid #f8bbd0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    width: 100%;
    color: #5d4037;
    background: #fff;
  }

  .birthday-input-wrap input[type="date"]:focus {
    border-color: #e91e63;
    box-shadow: 0 0 0 3px rgba(233,30,99,0.15);
  }

  .span-2 {
    grid-column: span 2;
  }

  /* 部位行（ボタン+★を横一列） */
  .part-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .part-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    background: #fafafa;
    border-radius: 10px;
  }

  .toggle-btn {
    padding: 8px 16px;
    border: 2px solid #ce93d8;
    border-radius: 30px;
    background: #fff;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #7b1fa2;
    user-select: none;
    min-width: 80px;
    text-align: center;
  }

  .toggle-btn:hover {
    background: #f3e5f5;
  }

  .toggle-btn.active {
    background: #ce93d8;
    color: #fff;
    border-color: #ab47bc;
    animation: btnBounce 0.3s ease;
  }

  @keyframes btnBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* 星レーティング */
  .stars {
    display: flex;
    gap: 2px;
  }

  .star {
    font-size: 26px;
    color: #e8e8e8;
    transition: all 0.15s ease;
    user-select: none;
    line-height: 1;
  }

  .stars.disabled .star {
    color: #e8e8e8;
    cursor: default;
    opacity: 0.5;
  }

  .stars.enabled .star {
    cursor: pointer;
    color: #e0e0e0;
    opacity: 1;
  }

  .stars.enabled .star.filled {
    color: #ffb300;
  }

  .stars.enabled .star:hover {
    transform: scale(1.2);
  }

  /* 症状ボタン */
  .symptoms {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .symptom-btn {
    padding: 8px 16px;
    border: 2px solid #81d4fa;
    border-radius: 30px;
    background: #fff;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #0277bd;
    user-select: none;
  }

  .symptom-btn:hover {
    background: #e1f5fe;
  }

  .symptom-btn.active {
    background: #4fc3f7;
    color: #fff;
    border-color: #0288d1;
    animation: btnBounce 0.3s ease;
  }

  /* しんだんボタン */
  .diagnose-btn {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    font-family: inherit;
    font-weight: bold;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: linear-gradient(135deg, #f48fb1, #ce93d8);
    color: #fff;
    transition: all 0.2s ease;
    letter-spacing: 2px;
  }

  .diagnose-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(233,30,99,0.3);
  }

  .diagnose-btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="karte">
  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <h1>🏥 でんしカルテ</h1>
      <span class="key-hint">⌨ キーボードを おすと ランプが ひかるよ！</span>
    </div>
    <div class="lamps" id="lamps">
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
      <div class="lamp"></div>
    </div>
  </div>

  <!-- メイン2カラム -->
  <div class="main-layout">

    <!-- ===== 左パネル：入力エリア ===== -->
    <div class="left-panel">

      <!-- 患者情報入力 -->
      <div class="section">
        <div class="section-title">📝 かんじゃさん じょうほう</div>
        <div class="patient-grid">
          <label>なまえ</label>
          <input type="text" id="patientName" placeholder="なまえを いれてね">

          <label>せいべつ</label>
          <div class="gender-options">
            <label><input type="radio" name="gender" value="boy"> おとこのこ</label>
            <label><input type="radio" name="gender" value="girl"> おんなのこ</label>
          </div>

          <label>たんじょうび</label>
          <div class="birthday-input-wrap">
            <input type="date" id="birthDate" min="2019-01-01" max="2026-12-31">
          </div>
        </div>
      </div>

      <!-- どこがつらい -->
      <div class="section">
        <div class="section-title">🩺 どこが つらい？</div>
        <div class="part-rows" id="bodyParts">
          <div class="part-row">
            <button class="toggle-btn" data-part="おなか">おなか</button>
            <div class="stars disabled" data-part="おなか">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="あたま">あたま</button>
            <div class="stars disabled" data-part="あたま">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="のど">のど</button>
            <div class="stars disabled" data-part="のど">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="て・あし">て・あし</button>
            <div class="stars disabled" data-part="て・あし">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="みみ">みみ</button>
            <div class="stars disabled" data-part="みみ">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
          <div class="part-row">
            <button class="toggle-btn" data-part="め">め</button>
            <div class="stars disabled" data-part="め">
              <span class="star" data-val="1">★</span><span class="star" data-val="2">★</span><span class="star" data-val="3">★</span><span class="star" data-val="4">★</span><span class="star" data-val="5">★</span>
            </div>
          </div>
        </div>
      </div>

      <!-- どんなかんじ -->
      <div class="section">
        <div class="section-title">🤔 どんな かんじ？</div>
        <div class="symptoms" id="symptoms">
          <button class="symptom-btn" data-symptom="いたい">いたい</button>
          <button class="symptom-btn" data-symptom="かゆい">かゆい</button>
          <button class="symptom-btn" data-symptom="ねつがある">ねつがある</button>
          <button class="symptom-btn" data-symptom="だるい">だるい</button>
          <button class="symptom-btn" data-symptom="せきがでる">せきがでる</button>
        </div>
      </div>

      <!-- しんだんボタン -->
      <button class="diagnose-btn" id="diagnoseBtn">🔍 しんだんする！</button>
    </div>

    <!-- ===== 右パネル：結果表示 ===== -->
    <div class="right-panel">
      <div class="section-title">📋 カルテ</div>

      <!-- 患者サマリー -->
      <div class="patient-summary">
        <dl class="patient-summary-grid">
          <dt>うけつけ No.</dt>
          <dd><span class="reception-number" id="receptionNumber">0001</span></dd>
          <dt>なまえ</dt>
          <dd id="summaryName">ー</dd>
          <dt>せいべつ</dt>
          <dd id="summaryGender">ー</dd>
          <dt>たんじょうび</dt>
          <dd id="summaryBirthday">ー</dd>
        </dl>
      </div>

      <!-- 診断結果 -->
      <div class="result-section">
        <div class="result-box result-shindan">
          <h3>🩺 しんだん けっか</h3>
          <div class="result-text empty" id="resultDiagnosis">しんだん まち…</div>
        </div>
        <div class="result-box result-medicine">
          <h3>💊 おくすり</h3>
          <div class="result-text empty" id="resultMedicine">しんだん まち…</div>
        </div>
        <div class="result-box result-advice">
          <h3>📝 せんせいから ひとこと</h3>
          <div class="result-text empty" id="resultAdvice">しんだん まち…</div>
        </div>
      </div>

      <!-- リセット -->
      <button class="reset-btn" id="resetBtn">👋 つぎの かんじゃさん</button>
    </div>

  </div>
</div>

<script>
  // --- 状態管理 ---
  const state = {
    selectedParts: {},
    selectedSymptoms: new Set()
  };

  // --- 受付番号 ---
  function generateReceptionNumber() {
    return String(Math.floor(Math.random() * 9999) + 1).padStart(4, '0');
  }
  document.getElementById('receptionNumber').textContent = generateReceptionNumber();

  // --- 左パネル患者サマリーのリアルタイム更新 ---
  document.getElementById('patientName').addEventListener('input', updateSummary);
  document.querySelectorAll('input[name="gender"]').forEach(r => r.addEventListener('change', updateSummary));
  document.getElementById('birthDate').addEventListener('change', updateSummary);

  function updateSummary() {
    const name = document.getElementById('patientName').value;
    const genderEl = document.querySelector('input[name="gender"]:checked');
    const dateVal = document.getElementById('birthDate').value;

    const nameDD = document.getElementById('summaryName');
    nameDD.textContent = name || 'ー';
    nameDD.className = name ? 'filled' : '';

    const genderDD = document.getElementById('summaryGender');
    if (genderEl) {
      genderDD.textContent = genderEl.value === 'boy' ? 'おとこのこ' : 'おんなのこ';
      genderDD.className = 'filled';
    } else {
      genderDD.textContent = 'ー';
      genderDD.className = '';
    }

    const bdDD = document.getElementById('summaryBirthday');
    if (dateVal) {
      const [y, m, d] = dateVal.split('-');
      bdDD.textContent = Number(y) + 'ねん ' + Number(m) + 'がつ ' + Number(d) + 'にち';
      bdDD.className = 'filled';
    } else {
      bdDD.textContent = 'ー';
      bdDD.className = '';
    }
  }

  // --- ランプ ---
  const lampColors = [
    '#f48fb1', '#81d4fa', '#fff176', '#a5d6a7',
    '#ce93d8', '#ffab91', '#80deea', '#f8bbd0',
  ];

  const lamps = document.querySelectorAll('.lamp');

  document.addEventListener('keydown', () => {
    const count = Math.floor(Math.random() * 3) + 1;
    const indices = [];
    while (indices.length < count) {
      const idx = Math.floor(Math.random() * lamps.length);
      if (!indices.includes(idx)) indices.push(idx);
    }
    indices.forEach(idx => {
      const lamp = lamps[idx];
      const color = lampColors[Math.floor(Math.random() * lampColors.length)];
      lamp.style.background = color;
      lamp.style.setProperty('--glow-color', color);
      lamp.classList.remove('on');
      void lamp.offsetWidth;
      lamp.classList.add('on');
      setTimeout(() => {
        lamp.classList.remove('on');
        lamp.style.background = '#e0e0e0';
      }, 400 + Math.random() * 300);
    });
  });

  // --- 部位ボタン ---
  document.getElementById('bodyParts').addEventListener('click', (e) => {
    // 部位トグルボタン
    const btn = e.target.closest('.toggle-btn');
    if (btn) {
      const part = btn.dataset.part;
      const starsDiv = document.querySelector('.stars[data-part="' + part + '"]');
      if (btn.classList.contains('active')) {
        btn.classList.remove('active');
        delete state.selectedParts[part];
        starsDiv.classList.remove('enabled');
        starsDiv.classList.add('disabled');
        starsDiv.querySelectorAll('.star').forEach(s => s.classList.remove('filled'));
      } else {
        btn.classList.add('active');
        state.selectedParts[part] = 1;
        starsDiv.classList.remove('disabled');
        starsDiv.classList.add('enabled');
        updateStarsUI(part);
      }
      return;
    }

    // 星クリック
    const star = e.target.closest('.star');
    if (star) {
      const starsDiv = star.closest('.stars');
      if (starsDiv.classList.contains('disabled')) return;
      const part = starsDiv.dataset.part;
      const val = Number(star.dataset.val);
      state.selectedParts[part] = val;
      updateStarsUI(part);
    }
  });

  function updateStarsUI(part) {
    const starsDiv = document.querySelector('.stars[data-part="' + part + '"]');
    const level = state.selectedParts[part] || 0;
    starsDiv.querySelectorAll('.star').forEach(s => {
      if (Number(s.dataset.val) <= level) {
        s.classList.add('filled');
      } else {
        s.classList.remove('filled');
      }
    });
  }

  // --- 症状ボタン ---
  document.getElementById('symptoms').addEventListener('click', (e) => {
    const btn = e.target.closest('.symptom-btn');
    if (!btn) return;
    const symptom = btn.dataset.symptom;
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      state.selectedSymptoms.delete(symptom);
    } else {
      btn.classList.add('active');
      state.selectedSymptoms.add(symptom);
    }
  });

  // --- 診断ロジック ---
  const diagnoses = {
    'おなか': [
      'おなかの かぜ だね！',
      'すこし おなかが つかれてるね',
      'おなかの むしさんが げんき すぎるね',
    ],
    'あたま': [
      'すこし あたまが つかれてるね',
      'あたまの かぜ だね！',
      'かんがえ すぎちゃったかな',
    ],
    'のど': [
      'のどの かぜ だね！',
      'のどが カラカラ だね',
      'のどの ばいきんさんが いるね',
    ],
    'て・あし': [
      'すこし つかれが たまってるね',
      'いっぱい あそんだ しょうこ だね！',
      'きんにくさんが がんばりすぎ だね',
    ],
    'みみ': [
      'みみの おそうじが ひつよう だね',
      'みみさんが すこし おつかれ だね',
      'みみの なかに ちいさい ばいきんさんが いるね',
    ],
    'め': [
      'めが すこし つかれてるね',
      'めの ばいきんさんを やっつけよう！',
      'めを たくさん つかったね',
    ]
  };

  const medicines = [
    'いちごあじの おくすりシロップ',
    'メロンあじの のみぐすり',
    'にじいろ ばんそうこう',
    'おほしさま カプセル',
    'ブルーベリーあじの おくすり',
    'ハートがたの ビタミンざい',
    'きらきら おくすりシール',
    'ぶどうあじの トローチ',
    'さくらいろの ぬりぐすり',
    'バナナあじの おくすりゼリー',
  ];

  const advicesNormal = [
    'きょうは はやく ねようね',
    'おみずを たくさん のもうね',
    'あったかく して やすんでね',
    'だいじょうぶ！ すぐ げんきに なるよ',
    'ゆっくり やすめば なおるよ',
    'えいようの ある ごはんを たべようね',
  ];

  const advicesSerious = [
    'しっかり おやすみ してね！ だいじょうぶ！',
    'たくさん ねて たくさん たべてね！',
    'おくすりを のんで ぐっすり ねようね！',
    'あしたには げんきに なるよ！ やくそく！',
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function setResult(id, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.remove('empty');
    el.classList.add('filled');
    // re-trigger animation
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  }

  function clearResult(id, placeholder) {
    const el = document.getElementById(id);
    el.textContent = placeholder;
    el.classList.remove('filled');
    el.classList.add('empty');
  }

  document.getElementById('diagnoseBtn').addEventListener('click', () => {
    const parts = Object.keys(state.selectedParts);

    if (parts.length === 0 && state.selectedSymptoms.size === 0) {
      setResult('resultDiagnosis', 'とっても げんき だね！');
      setResult('resultMedicine', 'おくすりは いらないよ！');
      setResult('resultAdvice', 'この ちょうしで がんばろう！');
    } else {
      let mainPart = parts[0] || 'からだ';
      let maxStrength = 0;
      parts.forEach(p => {
        if (state.selectedParts[p] > maxStrength) {
          maxStrength = state.selectedParts[p];
          mainPart = p;
        }
      });

      const diagList = diagnoses[mainPart] || ['ちょっと つかれて いるみたい'];
      setResult('resultDiagnosis', pick(diagList));
      setResult('resultMedicine', pick(medicines));

      if (maxStrength >= 4) {
        setResult('resultAdvice', pick(advicesSerious));
      } else {
        setResult('resultAdvice', pick(advicesNormal));
      }
    }
  });

  // --- リセット ---
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('receptionNumber').textContent = generateReceptionNumber();
    document.getElementById('patientName').value = '';
    document.querySelectorAll('input[name="gender"]').forEach(r => r.checked = false);
    document.getElementById('birthDate').value = '';
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    state.selectedParts = {};
    document.querySelectorAll('.stars').forEach(s => {
      s.classList.remove('enabled');
      s.classList.add('disabled');
      s.querySelectorAll('.star').forEach(st => st.classList.remove('filled'));
    });
    document.querySelectorAll('.symptom-btn').forEach(b => b.classList.remove('active'));
    state.selectedSymptoms.clear();

    clearResult('resultDiagnosis', 'しんだん まち…');
    clearResult('resultMedicine', 'しんだん まち…');
    clearResult('resultAdvice', 'しんだん まち…');

    updateSummary();
  });
</script>

</body>
</html>
